HTML
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>

    <h1>{{ page_title }}</h1>
    <p>Below is a list of all currently enrolled students:</p>

    <ul>
        <!-- Loop through the list of students passed from the view -->
        {% for student in students %}
            <li>
                <strong>{{ student.name }} {{ student.age }}</strong> 
                — phone: {{ student.phone_no }}
            </li>
        {% empty %}
            <!-- This runs if the database is empty -->
            <li>No students found in the database.</li>
        {% endfor %}
    </ul>

</body>
</html>
